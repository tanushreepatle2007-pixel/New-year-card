<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS OBJECT FIT AND POSITION</title>
</head>
<style>
    .container {
        height: 550px;
        width: 550px;
        border: 2px solid rgb(222, 24, 186);
        background-color: rgb(143, 230, 143);
    }

    img {
        height: 550px;
        width: 550px;
        object-fit: cover;
        object-position:bottom right;
    }
</style>

<body>
    <div class="container">
        <img src="https://i.pinimg.com/1200x/7b/87/2e/7b872e94767f0b50434bc21d808369d3.jpg">
    </div>
</body>

</html>
